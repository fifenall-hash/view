<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Let's Number!</title>
    <style>
        /* CSS 변수 초기화 */
        :root {
            --k: 1px; /* JS에서 이 값을 동적으로 계산하여 덮어씁니다. */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            /* 기본 폰트 사이즈도 k에 연동해 둡니다. */
            font-size: calc(var(--k) * 0.35); 
        }

        #app-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #333;
            overflow: hidden;
            width: 100%;
        }

        /* 16:9 메인 컨테이너 */
        #app-container {
            width: calc(var(--k) * 16);
            height: calc(var(--k) * 9);
            background-color: #f5f5f5;
            
            /* 16k를 3.5k(메뉴), 9.5k(중앙), 3k(트레이)로 분할 */
            display: grid;
            grid-template-columns: calc(var(--k) * 3.5) calc(var(--k) * 9.5) calc(var(--k) * 3);
            
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* 하단 안전 영역 */
        #bottom-safe-area {
            width: 100%;
            background-color: #000;
        }

        /* ---------------------------------------------------
           메뉴 프레임 및 버튼 영역 (글자 크기 k 비례 적용)
        --------------------------------------------------- */
        #menu-frame {
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: calc(var(--k) * 0.1) 0 calc(var(--k) * 0.3) rgba(0,0,0,0.1);
            z-index: 10;
        }

        .menu-logo {
            width: calc(var(--k) * 2.5);
            margin-bottom: calc(var(--k) * 0.8);
            object-fit: contain;
        }

        .menu-btn {
            width: calc(var(--k) * 2.8);
            padding: calc(var(--k) * 0.3);
            margin: calc(var(--k) * 0.15) 0;
            font-size: calc(var(--k) * 0.35); /* 버튼 글자 크기 동적 조절 */
            font-weight: bold;
            background-color: #e0e0e0;
            border: none;
            border-radius: calc(var(--k) * 0.2);
            cursor: pointer;
        }

        .menu-btn.completed { background-color: #A0E8AF; color: black; }

        /* ---------------------------------------------------
           중앙 게임 영역 (글자 크기 k 비례 적용)
        --------------------------------------------------- */
        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: calc(var(--k) * 0.5);
            box-sizing: border-box;
            position: relative;
        }

        /* 옵션 바 글자 크기 */
        .options-bar {
            display: flex;
            gap: calc(var(--k) * 0.3);
            margin-bottom: calc(var(--k) * 0.3);
            align-items: center;
            font-weight: bold;
            font-size: calc(var(--k) * 0.3); /* 체크박스 등 글자 크기 동적 조절 */
        }

        /* 질문 텍스트 글자 크기 */
        .question-text {
            font-size: calc(var(--k) * 0.7); /* 질문 글자 크기 동적 조절 */
            font-weight: bold;
            margin-bottom: calc(var(--k) * 0.5);
            text-align: center;
            cursor: pointer;
        }

        .items-tray {
            display: flex;
            gap: calc(var(--k) * 0.2);
            margin-top: calc(var(--k) * 0.5);
            background: rgba(255, 255, 255, 0.7);
            padding: calc(var(--k) * 0.2);
            border-radius: calc(var(--k) * 0.3);
        }

        .draggable-item {
            width: calc(var(--k) * 1.2);
            height: calc(var(--k) * 1.2);
            cursor: pointer;
        }

        #drop-zone {
            width: calc(var(--k) * 6);
            height: calc(var(--k) * 4);
            border: calc(var(--k) * 0.05) dashed #ccc;
            border-radius: calc(var(--k) * 0.4);
            position: relative;
            display: flex;
            flex-wrap: wrap-reverse;
            align-content: flex-start;
            padding: calc(var(--k) * 0.2);
            gap: calc(var(--k) * 0.2);
        }

        .placed-item {
            width: calc(var(--k) * 1.2);
            height: calc(var(--k) * 1.2);
        }

        /* 하단 전달 버튼 글자 크기 */
        .submit-btn {
            padding: calc(var(--k) * 0.2) calc(var(--k) * 0.8);
            font-size: calc(var(--k) * 0.5); /* 버튼 글자 크기 동적 조절 */
            font-weight: bold;
            background-color: #FFD700;
            border: none;
            border-radius: calc(var(--k) * 0.3);
            margin-top: calc(var(--k) * 0.5);
            cursor: pointer;
        }

        /* ---------------------------------------------------
           우측 배너 영역
        --------------------------------------------------- */
        #banner-area {
            padding: calc(var(--k) * 0.5) calc(var(--k) * 0.5) calc(var(--k) * 0.5) 0;
            box-sizing: border-box;
        }

        #banner-frame {
            width: 100%;
            height: 100%;
            background-color: #D2B48C;
            border: calc(var(--k) * 0.1) solid #8B4513;
            border-radius: calc(var(--k) * 0.2);
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: calc(var(--k) * 0.2);
            box-sizing: border-box;
        }

        .banner-item {
            width: calc(var(--k) * 1);
            height: calc(var(--k) * 1);
            margin: calc(var(--k) * 0.08);
            background-size: cover;
        }

    </style>
</head>
<body>

    <div id="app-wrapper">
        <div id="app-container">
            <div id="menu-frame">
                <img src="images/로고.png" alt="Let's Number Logo" class="menu-logo" onerror="this.src=''">
                <button class="menu-btn" onclick="startGame('숫자 세기 놀이')">숫자 세기 놀이</button>
                <button class="menu-btn" onclick="startGame('더하기 놀이')">더하기 놀이</button>
                <button class="menu-btn" onclick="startGame('빼기 놀이')">빼기 놀이</button>
                <button class="menu-btn" onclick="startGame('곱하기 놀이')">곱하기 놀이</button>
                <button class="menu-btn" onclick="startGame('시계 보기 놀이')">시계 보기 놀이</button>
            </div>

            <div id="game-area">
                <!-- 초기 로딩 텍스트 글자 크기도 k에 연동합니다 -->
                <h1 style="color: #888; text-align: center; font-size: calc(var(--k) * 0.6);">왼쪽에서 메뉴를 선택하세요.</h1>
            </div>
            
            <div id="banner-area">
                <div id="banner-frame"></div>
            </div>
        </div>
    </div>

    <!-- 동적으로 크기가 조정될 안전 영역 -->
    <div id="bottom-safe-area"></div>

    <audio id="bgm-player" loop>
        <source src="sounds_basic/bgm.wav" type="audio/wav">
    </audio>

<script>
    // ==========================================
    // k 배수 레이아웃 연산 엔진
    // ==========================================
    function calculateLayout() {
        const ua = navigator.userAgent;
        // Windows 또는 Mobile 환경 감지
        const isWindowsOrMobile = /Windows|Mobile/i.test(ua);
        
        const safeAreaEl = document.getElementById('bottom-safe-area');
        let safeAreaHeight = 0;
        
        // 환경에 따른 하단 안전바 높이 할당
        if (isWindowsOrMobile) {
            safeAreaEl.style.display = 'none';
        } else {
            safeAreaEl.style.display = 'block';
            safeAreaHeight = window.innerHeight * 0.08; // 뷰포트 높이의 8%
            safeAreaEl.style.height = `${safeAreaHeight}px`;
        }
        
        // 실제 사용 가능한 너비와 높이 산출
        const availableWidth = window.innerWidth;
        const availableHeight = window.innerHeight - safeAreaHeight;
        
        // 가로 16, 세로 9를 벗어나지 않는 가장 큰 정수 k값 도출
        let k = Math.floor(Math.min(availableWidth / 16, availableHeight / 9));
        
        // 너무 작아져서 레이아웃이 붕괴되는 것을 방지 (최소 1px)
        k = Math.max(1, k);
        
        // 계산된 k값을 HTML 최상단 요소의 CSS 변수로 주입
        document.documentElement.style.setProperty('--k', `${k}px`);
    }

    // 창 크기 변경 시 재계산 이벤트 리스너 등록
    window.addEventListener('resize', calculateLayout);
    // 진입 시 즉시 1회 계산
    calculateLayout();

    // ==========================================
    // 게임 상태 및 로직
    // ==========================================
    const items = ['단추', '딸기', '블록', '빗', '빵', '수박', '숟가락', '연필', '자동차', '칫솔'];
    const solvedItems = { '숫자 세기 놀이': [], '더하기 놀이': [], '빼기 놀이': [], '곱하기 놀이': [], '시계 보기 놀이': [] };

    let currentGame = null;
    let targetItem = "";
    let targetNumber = 0;
    let placedItemsCount = 0;
    let soundType = "고유어"; 
    let soundEnabled = true;

    const koreanNumbers = {1: "하나", 2: "둘", 3: "셋", 4: "넷", 5: "다섯", 6: "여섯", 7: "일곱", 8: "여덟", 9: "아홉", 10: "열", 11: "열하나", 12: "열둘", 13: "열셋", 14: "열넷", 15: "열다섯", 16: "열여섯", 17: "열일곱", 18: "열여덟", 19: "열아홉", 20: "스물"};
    const sinoNumbers = {1: "일", 2: "이", 3: "삼", 4: "사", 5: "오", 6: "육", 7: "칠", 8: "팔", 9: "구", 10: "십", 11: "십일", 12: "십이", 13: "십삼", 14: "십사", 15: "십오", 16: "십육", 17: "십칠", 18: "십팔", 19: "십구", 20: "이십"};

    let currentAudio = null;
    function playSound(fileName) {
        if (currentAudio) currentAudio.pause();
        const folder = (/^\d+/.test(fileName) || /\[고유어\]/.test(fileName)) ? 'sounds_number/' : 'sounds_basic/';
        currentAudio = new Audio(folder + fileName);
        currentAudio.play().catch(e => console.log("Audio error:", e));
        return currentAudio;
    }

    function playSoundSequence(fileNames) {
        if (fileNames.length === 0) return;
        const audio = playSound(fileNames[0]);
        audio.onended = () => playSoundSequence(fileNames.slice(1));
    }

    document.body.addEventListener('click', () => {
        const bgm = document.getElementById('bgm-player');
        if (bgm.paused) bgm.play().catch(e => console.log("BGM error", e));
    }, { once: true });

    function startGame(gameName) {
        currentGame = gameName;
        updateBanner();
        if (gameName === '숫자 세기 놀이') {
            initCountingGame();
        } else {
            // 다른 게임 메뉴를 눌렀을 때 나오는 문구의 크기도 k에 연동합니다.
            document.getElementById('game-area').innerHTML = `<h1 style="color: #888; font-size: calc(var(--k) * 0.7);">${gameName} 업데이트 준비 중입니다!</h1>`;
        }
    }

    function initCountingGame() {
        const availableItems = items.filter(i => !solvedItems['숫자 세기 놀이'].includes(i));
        if (availableItems.length === 0) return showCompletionScreen('숫자 세기 놀이');
        
        targetItem = availableItems[Math.floor(Math.random() * availableItems.length)];
        targetNumber = Math.floor(Math.random() * 20) + 1;
        placedItemsCount = 0;

        document.getElementById('game-area').innerHTML = `
            <div class="options-bar">
                <label><input type="checkbox" checked onchange="soundEnabled = this.checked"> 수 세는 소리</label>
                <label><input type="radio" name="sndType" value="고유어" checked onchange="soundType = this.value"> 고유어</label>
                <label><input type="radio" name="sndType" value="한자어" onchange="soundType = this.value"> 한자어</label>
            </div>
            <div class="question-text" onclick="replayQuestion()">${targetItem} ${targetNumber}개 줄래?</div>
            <div id="drop-zone" onclick="placeItem()"></div>
            <div class="items-tray">
                ${availableItems.map(item => `<img src="images/${item}.png" class="draggable-item" onclick="selectItem('${item}')" onerror="this.src=''">`).join('')}
            </div>
            <button class="submit-btn" onclick="checkCountingAnswer()">전달</button>
        `;
        playSoundSequence([`${targetItem}.wav`, `${targetNumber}개줄래.wav`]);
    }

    let selectedItemForPlacement = null;
    function selectItem(itemName) {
        selectedItemForPlacement = itemName;
        document.getElementById('drop-zone').style.cursor = `url('images/${itemName}.png') 30 30, pointer`;
    }

    function placeItem() {
        if (!selectedItemForPlacement || placedItemsCount >= 20) return;
        placedItemsCount++;
        const img = document.createElement('img');
        img.src = `images/${selectedItemForPlacement}.png`;
        img.className = 'placed-item';
        img.oncontextmenu = (e) => { e.preventDefault(); if(placedItemsCount > 0){ img.remove(); placedItemsCount--; } };
        document.getElementById('drop-zone').appendChild(img);
        
        if (soundEnabled) playSound(`${soundType === "고유어" ? koreanNumbers[placedItemsCount] : sinoNumbers[placedItemsCount]}.wav`);
    }

    function replayQuestion() { playSoundSequence([`${targetItem}.wav`, `${targetNumber}개줄래.wav`]); }

    function checkCountingAnswer() {
        const dropZoneItems = document.getElementById('drop-zone').children;
        let isCorrect = dropZoneItems.length === targetNumber && Array.from(dropZoneItems).every(img => img.src.includes(targetItem));
        
        if (isCorrect) {
            playSound('고마워.wav');
            solvedItems['숫자 세기 놀이'].push(targetItem);
            updateBanner();
            setTimeout(initCountingGame, 2000);
        } else {
            playSound('다시해보자.wav');
            document.querySelector('.question-text').innerText = "다시 해보자.";
            setTimeout(() => {
                document.querySelector('.question-text').innerText = `${targetItem} ${targetNumber}개 줄래?`;
                document.getElementById('drop-zone').innerHTML = '';
                placedItemsCount = 0;
            }, 2000);
        }
    }

    function updateBanner() {
        const banner = document.getElementById('banner-frame');
        banner.innerHTML = '';
        (solvedItems[currentGame] || []).forEach(item => {
            const div = document.createElement('div');
            div.className = 'banner-item';
            div.style.backgroundImage = `url('images/${item}.png')`;
            banner.appendChild(div);
        });
    }

    function showCompletionScreen(gameName) {
        // 완료 화면의 글자 크기도 k에 연동되도록 수정했습니다.
        document.getElementById('game-area').innerHTML = `
            <h1 style="font-size: calc(var(--k) * 1); color: black; margin-bottom: calc(var(--k) * 0.2);">다 했어. 고마워!</h1>
            <p style="font-size: calc(var(--k) * 0.6); color: blue; font-weight: bold; margin-top: 0;">🎉 ${gameName} 마스터! 🎉</p>
        `;
        playSound('다했어고마워.wav');
        document.querySelectorAll('.menu-btn').forEach(btn => { if(btn.innerText.includes(gameName)) btn.classList.add('completed'); });
    }
</script>

</body>
</html>
